<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painting Similarity Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1e;
      color: #e8e6e3;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #9a9590;
      margin-bottom: 2rem;
    }

    #dropzone {
      border: 2px dashed #4a4845;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 2rem;
    }

    #dropzone:hover, #dropzone.dragover {
      border-color: #c4a882;
      background: rgba(196, 168, 130, 0.05);
    }

    #dropzone p { color: #9a9590; margin-top: 0.5rem; }

    #file-input { display: none; }

    #query-section {
      display: none;
      margin-bottom: 2rem;
    }

    #query-section.visible { display: block; }

    #query-preview {
      max-width: 280px;
      max-height: 280px;
      border-radius: 8px;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #status {
      color: #9a9590;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
    }

    #status.error { color: #e07070; }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #252529;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-2px); }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 0.75rem;
      font-size: 0.85rem;
    }

    .score {
      color: #c4a882;
      font-weight: 600;
    }

    .path {
      color: #6a6560;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>Painting Similarity Search</h1>
  <p class="subtitle">Drop a painting to find visually similar works in the collection.</p>

  <div id="dropzone">
    <strong>Drop an image here</strong> or click to browse
    <p>JPG, PNG, WebP</p>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div id="query-section">
    <img id="query-preview" alt="Query painting">
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const querySection = document.getElementById('query-section');
    const queryPreview = document.getElementById('query-preview');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    dropzone.addEventListener('click', () => fileInput.click());

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) search(file);
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) search(file);
    });

    async function search(file) {
      status.className = '';
      status.textContent = 'Searching…';
      results.innerHTML = '';

      queryPreview.src = URL.createObjectURL(file);
      querySection.classList.add('visible');

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/search', { method: 'POST', body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Search failed (${res.status})`);
        }
        const data = await res.json();
        status.textContent = `${data.matches.length} similar painting${data.matches.length !== 1 ? 's' : ''} found`;

        for (const match of data.matches) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${match.thumbnail_url}" alt="Match ${match.id}" loading="lazy">
            <div class="card-info">
              <div class="score">${(match.score * 100).toFixed(1)}% similar</div>
              <div class="path" title="${match.path}">${basename(match.path)}</div>
            </div>
          `;
          results.appendChild(card);
        }
      } catch (err) {
        status.className = 'error';
        status.textContent = err.message;
      }
    }

    function basename(path) {
      return path.split(/[/\\]/).pop();
    }
  </script>
</body>
</html>
